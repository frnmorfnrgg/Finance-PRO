<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™ Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --red: #ff3e3e; --border: rgba(255,255,255,0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 32px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .auth-card input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; border: 1px solid #222; background: #0a0a0a; color: white; outline: none; font-size: 16px; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--neon); color: #000; font-weight: 800; cursor: pointer; }

        header { padding: 20px 15px; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .wallet-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 24px; border: 1px solid var(--border); text-align: center; margin-bottom: 15px; }
        #label-carteira { font-size: 32px; font-weight: 800; margin: 10px 0; color: #fff; }
        
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: #111; color: #666; font-weight: 700; cursor: pointer; }
        .tab-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,136,0.05); }

        .container { padding: 20px 15px; max-width: 500px; margin: auto; }
        .view { display: none; }
        .view.active { display: block !important; }

        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .input-box { background: #0a0a0a; padding: 12px; border-radius: 14px; border: 1px solid #1a1a1a; margin-bottom: 10px; display: flex; align-items: center; }
        .input-box label { font-size: 9px; color: #555; text-transform: uppercase; font-weight: 800; display: block; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 15px; padding-top: 2px; }
        .input-box i { color: var(--neon); margin-right: 12px; width: 20px; text-align: center; }

        .btn-save { width: 100%; padding: 18px; border-radius: 16px; background: var(--neon); border: none; font-weight: 800; color: #000; cursor: pointer; }
        .hist-item { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); border-left: 5px solid #ffaa00; position: relative; }
        .btn-del { position: absolute; right: 15px; top: 15px; color: #444; background: none; border: none; font-size: 18px; cursor: pointer; }
        .btn-check { width: 100%; margin-top: 12px; padding: 12px; border-radius: 12px; border: 1px solid var(--neon); background: transparent; color: var(--neon); font-weight: 800; cursor: pointer; }
        
        .date-info { font-size: 11px; background: rgba(0,212,255,0.1); color: var(--blue); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 5px; font-weight: 600; }
        .ia-prazo-input { background: #000; border: 1px solid var(--blue); color: var(--blue); padding: 4px 8px; border-radius: 6px; width: 60px; font-weight: 800; text-align: center; outline: none; }

        .stat-label { font-size: 10px; color: #888; font-weight: 700; text-transform: uppercase; }
        .btn-zerar { background: rgba(255,62,62,0.1); color: var(--red); border: 1px solid rgba(255,62,62,0.2); padding: 8px 15px; border-radius: 10px; font-size: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="margin-bottom: 25px; font-weight: 800; color: var(--neon);">Finance PRO</h1>
        <input type="text" id="userField" placeholder="Seu ID">
        <input type="password" id="passField" placeholder="Sua Senha">
        <button class="btn-auth" onclick="handleLogin()">ENTRAR NO HUB</button>
    </div>
</div>

<header id="main-header" style="display:none">
    <div class="wallet-card">
        <span class="stat-label">Saldo Coletado</span>
        <div id="label-carteira">R$ 0,00</div>
        <button class="btn-zerar" onclick="zerarSaldoColetado()">LIMPAR SALDO</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; margin-top:15px;">
            <div><span class="stat-label">Investido</span><div id="label-inv" style="color:var(--blue); font-weight: 800;">R$ 0,00</div></div>
            <div style="border-left: 1px solid #222;"><span class="stat-label">Pendente</span><div id="label-lucro" style="color:#ffaa00; font-weight: 800;">R$ 0,00</div></div>
        </div>
    </div>
    <div class="nav-tabs">
        <button class="tab-btn active" id="tab-f" onclick="switchTab('financeiro')">CARTEIRA</button>
        <button class="tab-btn" id="tab-s" onclick="switchTab('scanner')">IA SCANNER</button>
    </div>
</header>

<div class="container" id="app-content" style="display:none">
    <div id="view-financeiro" class="view active">
        <div class="card">
            <div class="input-box"><i class="fas fa-calendar"></i><div style="flex:1"><label>Data Início</label><input type="date" id="inp-data"></div></div>
            <div class="input-box"><i class="fas fa-dollar-sign"></i><div style="flex:1"><label>Valor (R$)</label><input type="number" id="inp-p" placeholder="0.00"></div></div>
            <div class="input-box"><i class="fas fa-percent"></i><div style="flex:1"><label>Taxa Diária %</label><input type="number" id="inp-i" placeholder="0"></div></div>
            <div class="input-box"><i class="fas fa-clock"></i><div style="flex:1"><label>Prazo (Dias)</label><input type="number" id="inp-n" placeholder="Ex: 5"></div></div>
            <button class="btn-save" onclick="adicionarManual()">LANÇAR INVESTIMENTO</button>
        </div>
        <div id="lista-financeiro"></div>
    </div>

    <div id="view-scanner" class="view">
        <div style="background: #0a0a0a; border: 2px dashed #333; border-radius: 24px; padding: 40px 20px; text-align: center; cursor: pointer;" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-camera" style="font-size: 30px; color: var(--blue); margin-bottom: 10px;"></i><br>
            <b>ESCANEAR COMPROVANTE</b>
            <input type="file" id="file-input" accept="image/*" hidden onchange="processarIA(this)">
            <div id="loading" style="display:none; color: var(--blue); margin-top: 15px; font-weight: 800;">LENDO DADOS...</div>
        </div>
        
        <button id="btn-lancar-ia" style="display:none; width:100%; padding:18px; background:var(--neon); color:#000; border:none; border-radius:15px; font-weight:800; margin: 20px 0;" onclick="lancarEscaneados()">🚀 LANÇAR TUDO NO FINANCEIRO</button>
        
        <div id="lista-ia" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
    let currentUser = "";
    let dadosFinanceiros = [];
    let dadosEscaneados = [];
    let saldoCofre = 0;

    function handleLogin() {
        const u = document.getElementById('userField').value.trim().toLowerCase();
        if(!u) return;
        currentUser = u;
        localStorage.setItem('finance_session', u);
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'block';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('inp-data').valueAsDate = new Date();
        carregarTudo();
    }

    function switchTab(t) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + t).style.display = 'block';
        if(t === 'financeiro') document.getElementById('tab-f').classList.add('active');
        else document.getElementById('tab-s').classList.add('active');
    }

    function calcularDataSaida(dataInicioStr, dias) {
        if(!dataInicioStr) return "Erro";
        const partes = dataInicioStr.split('/');
        const data = new Date(partes[2], partes[1] - 1, partes[0]);
        data.setDate(data.getDate() + parseInt(dias || 0));
        return data.toLocaleDateString('pt-BR');
    }

    async function processarIA(input) {
        if (!input.files || !input.files[0]) return;
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        dadosEscaneados = [];
        
        try {
            const worker = await Tesseract.createWorker();
            await worker.loadLanguage('por');
            await worker.initialize('por');
            const { data: { text } } = await worker.recognize(input.files[0]);
            
            const regexMoeda = /(?:BRL|R\$)\s?(\d+[\.,]\d{2})/gi;
            const valores = [...text.matchAll(regexMoeda)].map(m => parseFloat(m[1].replace(',', '.')));
            let prazoDetectado = parseInt((text.match(/(\d+)\s*dias/i) || [])[1]) || 25; 

            for (let i = 0; i < valores.length; i += 2) {
                if (valores[i] !== undefined && valores[i+1] !== undefined) {
                    dadosEscaneados.push({
                        investido: valores[i], 
                        lucro: valores[i+1],
                        prazo: prazoDetectado 
                    });
                }
            }
            await worker.terminate();
            renderScanner();
        } catch (e) { Swal.fire("Erro", "Falha na leitura", "error"); }
        finally { loading.style.display = 'none'; input.value = ""; }
    }

    function renderScanner() {
        const btn = document.getElementById('btn-lancar-ia');
        btn.style.display = dadosEscaneados.length > 0 ? 'block' : 'none';
        const hoje = new Date().toLocaleDateString('pt-BR');
        
        document.getElementById('lista-ia').innerHTML = dadosEscaneados.map((item, index) => `
            <div class="card" style="border-left:4px solid var(--blue)">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <b style="font-size:14px;">Inv: R$ ${item.investido.toFixed(2)}</b><br>
                        <b style="color:var(--neon)">Lucro: R$ ${item.lucro.toFixed(2)}</b>
                    </div>
                    <div style="text-align:right">
                        <label style="font-size:9px; color:#888;">DIAS</label><br>
                        <input type="number" class="ia-prazo-input" value="${item.prazo}" 
                               onchange="atualizarPrazoIA(${index}, this.value)">
                    </div>
                </div>
                <div class="date-info">Saída prevista: ${calcularDataSaida(hoje, item.prazo)}</div>
            </div>
        `).join('');
    }

    function atualizarPrazoIA(index, novoValor) {
        dadosEscaneados[index].prazo = parseInt(novoValor) || 0;
        renderScanner();
    }

    function lancarEscaneados() {
        if(dadosEscaneados.length === 0) return;
        
        const hoje = new Date().toLocaleDateString('pt-BR');
        
        dadosEscaneados.forEach(item => {
            const novoItem = { 
                id: Date.now() + Math.random(), 
                valor: item.investido, 
                lucro: item.lucro, 
                data: hoje, 
                prazo: item.prazo, 
                saida: calcularDataSaida(hoje, item.prazo),
                recebido: false 
            };
            dadosFinanceiros.unshift(novoItem);
        });

        dadosEscaneados = []; // Limpa a lista de scan
        salvar();
        renderScanner(); // Atualiza a tela de scan (vai sumir o botão)
        switchTab('financeiro'); // Volta para a carteira
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Lançado!', showConfirmButton: false, timer: 2000 });
    }

    function adicionarManual() {
        const dataInput = document.getElementById('inp-data').value;
        const p = parseFloat(document.getElementById('inp-p').value) || 0;
        const i = parseFloat(document.getElementById('inp-i').value) || 0;
        const n = parseInt(document.getElementById('inp-n').value) || 0;

        if(!dataInput || p <= 0) return;

        const [ano, mes, dia] = dataInput.split('-');
        const dataFormatada = `${dia}/${mes}/${ano}`;

        dadosFinanceiros.unshift({
            id: Date.now(),
            valor: p,
            lucro: p * (i / 100) * n,
            data: dataFormatada,
            prazo: n,
            saida: calcularDataSaida(dataFormatada, n),
            recebido: false
        });

        salvar();
        document.getElementById('inp-p').value = "";
        document.getElementById('inp-n').value = "";
    }

    function carregarTudo() {
        dadosFinanceiros = JSON.parse(localStorage.getItem(currentUser + '_dados')) || [];
        saldoCofre = parseFloat(localStorage.getItem(currentUser + '_cofre')) || 0;
        renderFinanceiro();
    }

    function salvar() {
        localStorage.setItem(currentUser + '_dados', JSON.stringify(dadosFinanceiros));
        localStorage.setItem(currentUser + '_cofre', saldoCofre);
        renderFinanceiro();
    }

    function renderFinanceiro() {
        const f = (v) => parseFloat(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        let pLucro = 0, pInv = 0;
        
        document.getElementById('lista-financeiro').innerHTML = dadosFinanceiros.map(item => {
            if(!item.recebido) { pLucro += item.lucro; pInv += item.valor; }
            return `
                <div class="hist-item" style="border-left-color: ${item.recebido ? 'var(--neon)' : '#ffaa00'}">
                    <button class="btn-del" onclick="remover(${item.id})">&times;</button>
                    <small>${item.data} • <b>${item.prazo} dias</b></small><br>
                    <b>${f(item.valor)}</b> <span style="color:var(--neon)">+ ${f(item.lucro)}</span><br>
                    <div class="date-info">Saída em: ${item.saida}</div><br>
                    ${!item.recebido ? `
                        <button class="btn-check" onclick="marcarRecebido(${item.id})">COLETAR LUCRO</button>
                    ` : '<div style="color:var(--neon); font-size:11px; margin-top:8px; font-weight:800;">✓ COLETADO NO SALDO</div>'}
                </div>
            `;
        }).join('');

        document.getElementById('label-carteira').innerText = f(saldoCofre);
        document.getElementById('label-lucro').innerText = f(pLucro);
        document.getElementById('label-inv').innerText = f(pInv);
    }

    function marcarRecebido(id) {
        const it = dadosFinanceiros.find(d => d.id === id);
        if(it && !it.recebido) {
            it.recebido = true;
            saldoCofre += it.lucro;
            salvar();
        }
    }

    function remover(id) {
        dadosFinanceiros = dadosFinanceiros.filter(d => d.id != id);
        salvar();
    }

    function zerarSaldoColetado() {
        Swal.fire({ title: 'Zerar saldo?', icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) { saldoCofre = 0; salvar(); }
        });
    }

    window.onload = () => {
        if(localStorage.getItem('finance_session')) {
            document.getElementById('userField').value = localStorage.getItem('finance_session');
            handleLogin();
        }
    };
</script>
</body>
</html>
