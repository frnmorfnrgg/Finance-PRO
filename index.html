<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro PRO - HUB v5.0</title>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; }

        /* --- CABEÇALHO ÚNICO (SEM DUPLICAÇÃO) --- */
        .header {
            height: 85px; background: #111; display: flex; align-items: center;
            padding: 0 20px; border-bottom: 2px solid var(--primary); justify-content: space-between;
        }
        .stats-container { display: flex; gap: 12px; flex-grow: 1; margin-right: 15px; }
        .stat-card { 
            background: var(--card-bg); padding: 10px 15px; border-radius: 12px; 
            border: 1px solid #333; flex: 1; display: flex; flex-direction: column;
        }
        .stat-label { font-size: 9px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 16px; font-weight: 800; }
        .val-lucro { color: var(--primary); }
        .val-inv { color: #ffc107; }

        .btn-lancar {
            background: var(--secondary); color: #000; border: none;
            padding: 12px 18px; border-radius: 10px; font-weight: 900; font-size: 11px;
            cursor: pointer; text-transform: uppercase;
        }

        /* --- CONTEÚDO --- */
        .main-view { height: calc(100vh - 85px); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header class="header">
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">Lucro Total</span>
                <span id="topo-lucro" class="stat-val val-lucro">R$ 0,00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Investido IA</span>
                <span id="topo-inv" class="stat-val val-inv">R$ 0,00</span>
            </div>
        </div>
        
        <button class="btn-lancar" onclick="sincronizarAutomatico()">🚀 Lançar Saldo</button>
    </header>

    <main class="main-view">
        <iframe id="iframe-ia" src="https://frnmorfnrgg.github.io/Meu-financeiro-2/"></iframe>
    </main>

    <script>
        // Função para capturar e somar os valores automaticamente do Iframe
        function sincronizarAutomatico() {
            // Solicita os dados para a página de escaneamento
            const frame = document.getElementById('iframe-ia').contentWindow;
            frame.postMessage({ type: 'requestFullHistory' }, '*');
        }

        // Escutador que recebe os valores somados e atualiza o topo
        window.addEventListener('message', (e) => {
            if (e.data.type === 'sync_history' || e.data.type === 'lancar') {
                const lucroX = e.data.lucroTotal || 0;
                const investidoX = e.data.invTotal || 0;

                // Formata e atualiza o "Lucro Total" e "Investido IA"
                document.getElementById('topo-lucro').innerText = lucroX.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                document.getElementById('topo-inv').innerText = investidoX.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // Salva para persistência
                localStorage.setItem('hub_lucro', lucroX);
                localStorage.setItem('hub_inv', investidoX);

                // Envia de volta para atualizar o saldo disponível no painel central
                document.getElementById('iframe-ia').contentWindow.postMessage({
                    type: 'forceUpdateFinance',
                    lucro: lucroX,
                    investido: investidoX
                }, '*');
            }
        });

        // Carrega valores salvos ao iniciar
        window.onload = () => {
            const l = parseFloat(localStorage.getItem('hub_lucro') || 0);
            const i = parseFloat(localStorage.getItem('hub_inv') || 0);
            document.getElementById('topo-lucro').innerText = l.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('topo-inv').innerText = i.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };
    </script>
</body>
</html>
