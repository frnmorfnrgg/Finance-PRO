<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREMIUM FINANCE HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- GLOW BACKGROUND --- */
        .glow {
            position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            top: -100px; right: -100px; z-index: -1; pointer-events: none;
        }

        /* --- HEADER PREMIUM --- */
        header {
            height: 90px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .stats-wrapper { display: flex; gap: 20px; }
        .stat-premium {
            background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 25px;
            border-radius: 14px; min-width: 170px; transition: 0.3s;
        }
        .stat-premium:hover { border-color: var(--primary); transform: translateY(-2px); }
        .label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .value { font-size: 18px; font-weight: 800; display: block; }
        .lucro-text { color: var(--primary); text-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        .inv-text { color: var(--secondary); }

        /* --- ABAS DE NAVEGAÇÃO (SWITCH) --- */
        .tabs-nav {
            background: #111; padding: 5px; border-radius: 12px; display: flex; gap: 5px;
            border: 1px solid var(--glass-border);
        }
        .tab-btn {
            padding: 10px 20px; border: none; background: transparent; color: #666;
            font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 8px;
            text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .tab-btn.active { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }

        /* --- ÁREA DO CONTEÚDO (IFRAMES) --- */
        main { flex: 1; padding: 15px; position: relative; }
        .page { width: 100%; height: 100%; border-radius: 20px; overflow: hidden; display: none; border: 1px solid var(--glass-border); background: #000; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        iframe { width: 100%; height: 100%; border: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Botão Sincronizar */
        .btn-sync {
            background: #fff; color: #000; border: none; padding: 12px 20px; border-radius: 12px;
            font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <header>
        <div class="stats-wrapper">
            <div class="stat-premium">
                <span class="label">Lucro Acumulado</span>
                <span id="topo-lucro" class="value lucro-text">R$ 0,00</span>
            </div>
            <div class="stat-premium">
                <span class="label">Investimento IA</span>
                <span id="topo-inv" class="value inv-text">R$ 0,00</span>
            </div>
        </div>

        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('fin', this)">
                <i class="fas fa-wallet"></i> Financeiro
            </button>
            <button class="tab-btn" onclick="switchTab('ia', this)">
                <i class="fas fa-robot"></i> Scanner Cavalo
            </button>
        </nav>

        <button class="btn-sync" onclick="syncData()">Sincronizar</button>
    </header>

    <main>
        <div id="page-fin" class="page active">
            <iframe id="frame-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
        <div id="page-ia" class="page">
            <iframe id="frame-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
        </div>
    </main>

    <script>
        // Sistema de Troca de Abas
        function switchTab(target, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('page-' + target).classList.add('active');
            btn.classList.add('active');
        }

        // Sincronização de Dados entre Cavalo e Hub
        function syncData() {
            const frameIA = document.getElementById('frame-ia').contentWindow;
            // Solicita a soma dos lucros dos registros
            frameIA.postMessage({ type: 'requestFullHistory' }, '*');
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'sync_history' || e.data.type === 'lancar') {
                const totalLucro = e.data.lucroTotal || 0;
                const totalInv = e.data.invTotal || 0;

                // Atualiza o Topo
                const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                document.getElementById('topo-lucro').innerText = fmt(totalLucro);
                document.getElementById('topo-inv').innerText = fmt(totalInv);

                localStorage.setItem('hub_lucro', totalLucro);
                localStorage.setItem('hub_inv', totalInv);

                // Envia o valor atualizado para dentro do Financeiro 4
                document.getElementById('frame-fin').contentWindow.postMessage({
                    type: 'forceUpdateFinance',
                    lucro: totalLucro,
                    investido: totalInv
                }, '*');
            }
        });

        // Carregamento Inicial
        window.onload = () => {
            const l = parseFloat(localStorage.getItem('hub_lucro') || 0);
            const i = parseFloat(localStorage.getItem('hub_inv') || 0);
            const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('topo-lucro').innerText = fmt(l);
            document.getElementById('topo-inv').innerText = fmt(i);
        };
    </script>
</body>
    </html>
