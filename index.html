<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUB FINANCEIRO PRO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg: #000;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* LOGIN */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 25px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 16px; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; }

        /* HEADER FIXO */
        header {
            padding: 12px 15px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-box { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px; border-radius: 12px; text-align: center; }
        .stat-box span { display: block; }
        .stat-label { font-size: 7px; color: #777; text-transform: uppercase; font-weight: 800; }
        .stat-value { font-size: 14px; font-weight: 800; }

        .nav-bar { display: flex; gap: 8px; align-items: center; }
        .tab-btn {
            flex: 1; padding: 10px; border: none; background: #111; color: #555;
            font-size: 10px; font-weight: 800; border-radius: 8px; border: 1px solid var(--border);
        }
        .tab-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .btn-sync { background: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-size: 12px; cursor: pointer; }

        /* CONTEÚDO FULL SCREEN */
        main { flex: 1; width: 100%; position: relative; background: #000; }
        .viewport { width: 100%; height: 100%; display: none; }
        .viewport.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; outline: none; }

        .swal2-popup { border-radius: 20px !important; border: 1px solid var(--primary) !important; background: #0a0a0a !important; color: #fff !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--primary); margin-bottom: 20px;">Finance PRO</h1>
        <input type="text" id="auth-user" placeholder="ID de Usuário">
        <input type="password" id="auth-pass" placeholder="Senha">
        <button class="btn-auth" onclick="handleAuth()">ACESSAR PAINEL</button>
    </div>
</div>

<div id="app-content" style="display: none; height: 100vh; flex-direction: column;">
    <header>
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">Saldo Histórico</span>
                <span id="hub-lucro" class="stat-value" style="color: var(--primary);">R$ 0,00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Investimento</span>
                <span id="hub-inv" class="stat-value" style="color: var(--secondary);">R$ 0,00</span>
            </div>
        </div>

        <div class="nav-bar">
            <button class="tab-btn active" onclick="switchTab('ia', this)">SCANNER IA</button>
            <button class="tab-btn" onclick="switchTab('fin', this)">MEU FINANCEIRO</button>
            <button class="btn-sync" onclick="syncData()"><i class="fas fa-sync-alt"></i></button>
        </div>
    </header>

    <main>
        <div id="tab-ia" class="viewport active">
            <iframe id="frame-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
        </div>
        <div id="tab-fin" class="viewport">
            <iframe id="frame-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
    </main>
</div>

<script>
    let currentUser = "";

    function handleAuth() {
        const user = document.getElementById('auth-user').value.trim().toLowerCase();
        if(!user) return Swal.fire('Erro', 'Informe seu ID', 'error');
        
        currentUser = user;
        localStorage.setItem('finance_session', user);
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        
        loadStats();
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.viewport').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        btn.classList.add('active');
    }

    function syncData() {
        // Envia comando para a IA ler os dados e devolver para o Hub
        document.getElementById('frame-ia').contentWindow.postMessage({ type: 'requestFullHistory' }, '*');
    }

    window.addEventListener('message', (e) => {
        // Quando a IA ou o Financeiro enviam dados de saldo
        if (e.data.type === 'sync_history' || e.data.lucroTotal !== undefined) {
            const lucro = e.data.lucroTotal || 0;
            const inv = e.data.invTotal || 0;
            const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            document.getElementById('hub-lucro').innerText = f(lucro);
            document.getElementById('hub-inv').innerText = f(inv);

            localStorage.setItem(currentUser + '_lucro', lucro);
            localStorage.setItem(currentUser + '_inv', inv);

            Swal.fire({
                title: 'Sincronizado!',
                html: `<div style="text-align:left">Seu Saldo: <span style="float:right">${f(lucro)}</span><br>Investimento: <span style="float:right">${f(inv)}</span></div>`,
                icon: 'success',
                confirmButtonColor: '#00ff88'
            });
        }
    });

    function loadStats() {
        const l = parseFloat(localStorage.getItem(currentUser + '_lucro') || 0);
        const i = parseFloat(localStorage.getItem(currentUser + '_inv') || 0);
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('hub-lucro').innerText = f(l);
        document.getElementById('hub-inv').innerText = f(i);
    }

    window.onload = () => {
        const session = localStorage.getItem('finance_session');
        if(session) {
            document.getElementById('auth-user').value = session;
            handleAuth();
        }
    }
</script>
</body>
</html>
