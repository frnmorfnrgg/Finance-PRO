<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™ Exclusive</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --red: #ff3e3e; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 30px; min-height: 100vh; }
        
        /* LOGIN - CORREÇÃO DE Z-INDEX */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 16px; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* CABEÇALHO */
        header {
            padding: 20px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; display: block; }
        .stat-value { font-size: 18px; font-weight: 800; margin-top: 5px; }

        /* CONTEÚDO */
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .input-box { background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        
        .btn-save { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        /* LISTA */
        .hist-item { 
            background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 12px; 
            border: 1px solid #333; position: relative; border-left: 5px solid #ffaa00;
        }
        .btn-del { position: absolute; right: 10px; top: 10px; color: var(--red); background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; }
        .status-tag { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .pending { background: rgba(255, 170, 0, 0.15); color: #ffaa00; }
        .received { background: rgba(0, 255, 136, 0.15); color: var(--neon); }

        .btn-check { width: 100%; margin-top: 12px; padding: 10px; border-radius: 8px; border: 1px solid var(--neon); background: transparent; color: var(--neon); font-weight: bold; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin-bottom: 10px; font-size: 28px;">Finance PRO</h1>
        <p style="color: #666; font-size: 12px; margin-bottom: 20px;">Acesso Exclusivo</p>
        <input type="text" id="userField" placeholder="Digite seu ID">
        <input type="password" id="passField" placeholder="Senha">
        <button class="btn-auth" id="loginBtn" onclick="handleLogin()">ENTRAR NO PAINEL</button>
    </div>
</div>

<div id="app" style="display:none">
    <header>
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Saldo de Lucros</span>
                <span id="label-lucro" class="stat-value" style="color: var(--neon)">R$ 0,00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Total Investido</span>
                <span id="label-inv" class="stat-value" style="color: var(--blue)">R$ 0,00</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h3 style="font-size: 14px; margin-bottom: 15px; color: var(--neon)">Registrar Scanner</h3>
            <div class="input-box"><label>VALOR DO APORTE (R$)</label><input type="number" id="inp-p" placeholder="0.00"></div>
            <div class="input-box"><label>TAXA DE RETORNO (%)</label><input type="number" id="inp-i" placeholder="0"></div>
            <div class="input-box"><label>DIAS DE OPERAÇÃO</label><input type="number" id="inp-n" value="1"></div>
            <button class="btn-save" onclick="adicionarRegistro()">LANÇAR INVESTIMENTO</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 5px;">
            <h3 style="font-size: 12px; color: #888;">HISTÓRICO DE SCANNER</h3>
            <button onclick="logout()" style="background: none; border: none; color: #555; font-size: 10px; font-weight: bold;">SAIR</button>
        </div>
        
        <div id="lista"></div>
    </div>
</div>

<script>
    let currentUser = "";
    let dados = [];

    // FUNÇÃO DE LOGIN CORRIGIDA
    function handleLogin() {
        const u = document.getElementById('userField').value.trim().toLowerCase();
        if(!u) {
            Swal.fire('Atenção', 'Digite seu usuário para entrar', 'warning');
            return;
        }
        
        currentUser = u;
        localStorage.setItem('finance_session_active', u);
        
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        carregarDados();
    }

    function adicionarRegistro() {
        const p = parseFloat(document.getElementById('inp-p').value) || 0;
        const i = parseFloat(document.getElementById('inp-i').value) || 0;
        const n = parseInt(document.getElementById('inp-n').value) || 1;

        if(p <= 0) return Swal.fire('Erro', 'Insira o valor do investimento', 'error');

        const lucroCalculado = p * (i/100) * n;
        const novo = {
            id: Date.now(),
            valor: p,
            lucro: lucroCalculado,
            data: new Date().toLocaleDateString('pt-BR'),
            recebido: false
        };

        dados.unshift(novo);
        salvarEDesenhar();
        
        document.getElementById('inp-p').value = "";
        Swal.fire({ icon: 'success', title: 'Lançamento OK', background: '#111', color: '#fff', timer: 1500, showConfirmButton: false });
    }

    function removerRegistro(id) {
        Swal.fire({
            title: 'Remover?',
            text: "Excluir este registro permanentemente?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff3e3e',
            confirmButtonText: 'Sim, excluir'
        }).then(r => {
            if(r.isConfirmed) {
                dados = dados.filter(d => d.id !== id);
                salvarEDesenhar();
            }
        });
    }

    function marcarRecebido(id) {
        const item = dados.find(d => d.id === id);
        if(item) {
            item.recebido = true;
            salvarEDesenhar();
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Status: Recebido', showConfirmButton: false, timer: 1500 });
        }
    }

    function salvarEDesenhar() {
        localStorage.setItem(currentUser + '_finance_data', JSON.stringify(dados));
        desenharTela();
    }

    function carregarDados() {
        dados = JSON.parse(localStorage.getItem(currentUser + '_finance_data')) || [];
        desenharTela();
    }

    function desenharTela() {
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        let tLucro = 0;
        let tInv = 0;
        
        const html = dados.map(item => {
            tLucro += item.lucro;
            tInv += item.valor;

            return `
                <div class="hist-item" style="border-left-color: ${item.recebido ? 'var(--neon)' : '#ffaa00'}">
                    <button class="btn-del" onclick="removerRegistro(${item.id})">&times;</button>
                    <span class="status-tag ${item.recebido ? 'received' : 'pending'}">
                        ${item.recebido ? '<i class="fas fa-check-circle"></i> Recebido' : '<i class="fas fa-clock"></i> Pendente'}
                    </span>
                    <div style="margin-top:12px; font-size:14px">
                        <b style="color:#fff">${item.data}</b><br>
                        <div style="display:flex; justify-content:space-between; margin-top:5px">
                            <span style="color:#888">Aporte:</span> <span>${f(item.valor)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span style="color:var(--neon)">Lucro:</span> <span style="color:var(--neon)">+ ${f(item.lucro)}</span>
                        </div>
                    </div>
                    ${!item.recebido ? `<button class="btn-check" onclick="marcarRecebido(${item.id})">CONFIRMAR RECEBIMENTO</button>` : ''}
                </div>
            `;
        }).join('');

        document.getElementById('lista').innerHTML = html || '<p style="text-align:center; color:#444; margin-top:20px; font-size:12px;">Nenhum registro encontrado.</p>';
        document.getElementById('label-lucro').innerText = f(tLucro);
        document.getElementById('label-inv').innerText = f(tInv);
    }

    function logout() {
        localStorage.removeItem('finance_session_active');
        location.reload();
    }

    // Auto-login se já tiver sessão
    window.onload = () => {
        const s = localStorage.getItem('finance_session_active');
        if(s) { 
            document.getElementById('userField').value = s; 
            handleLogin(); 
        }
    };
</script>
</body>
</html>
