<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Unificado IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: sans-serif; overflow: hidden; background: #000; }

        /* Cabeçalho */
        .header {
            height: 60px;
            background: #1a1a1a;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 2px solid #007bff;
        }

        .title { font-weight: bold; font-size: 16px; flex-grow: 1; color: #007bff; }
        .total-balance { background: #222; padding: 5px 12px; border-radius: 20px; font-size: 14px; margin-right: 15px; border: 1px solid #444; }

        /* Ícone Menu */
        .menu-icon { width: 25px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-icon span { display: block; height: 3px; width: 100%; background: white; border-radius: 3px; }

        /* Menu Lateral */
        .nav-menu { position: fixed; top: 0; right: -260px; width: 260px; height: 100%; background: #111; transition: 0.3s; z-index: 9999; padding-top: 60px; }
        .nav-menu.active { right: 0; }
        .nav-link { display: block; padding: 18px 25px; color: white; text-decoration: none; border-bottom: 1px solid #222; }
        .nav-link:active { background: #007bff; }

        /* Conteúdo */
        .content { width: 100%; height: calc(100% - 60px); display: none; }
        .content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9998; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title" id="page-title">Meu Financeiro</div>
        <div class="total-balance">Total: <span id="saldo-geral">R$ 0,00</span></div>
        <div class="menu-icon" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="nav-menu" id="nav-menu">
        <a href="#" class="nav-link" onclick="switchTab('financeiro', 'Meu Financeiro')">💰 Meu Financeiro</a>
        <a href="#" class="nav-link" onclick="switchTab('cavalo', 'Project Escaneamento com IA')">🔍 Escaneamento com IA</a>
    </nav>

    <div id="financeiro" class="content active">
        <iframe id="iframe-financeiro" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
    </div>

    <div id="cavalo" class="content">
        <iframe id="iframe-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
    </div>

    <script>
        let saldoFinanceiro = 0;
        let saldoIA = 0;

        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function switchTab(tabId, title) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('page-title').innerText = title;
            toggleMenu();
        }

        // Função para capturar dados dos sites e somar (Lógica de Integração)
        window.addEventListener('message', function(event) {
            // Se você adicionar um código de envio no site do Cavalo e do Financeiro,
            // eles aparecerão aqui e somarão no cabeçalho automaticamente.
            if (event.data.type === 'updateBalance') {
                if (event.origin.includes('Cavalo')) {
                    saldoIA = event.data.value;
                } else {
                    saldoFinanceiro = event.data.value;
                }
                atualizarDisplay();
            }
        });

        function atualizarDisplay() {
            const total = saldoFinanceiro + saldoIA;
            document.getElementById('saldo-geral').innerText = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }
    </script>
</body>
</html>
